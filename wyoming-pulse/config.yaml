# Wyoming Pulse Configuration
# Sentiment tracking for data center development in Wyoming

feeds:
  - name: "Casper Star-Tribune"
    url: "https://trib.com/search/?f=rss&t=article&l=25&s=start_time&sd=desc"
    enabled: true

  - name: "WyoFile"
    url: "https://wyofile.com/feed/"
    enabled: true

  - name: "Wyoming Tribune Eagle"
    url: "https://www.wyomingnews.com/search/?f=rss&t=article&l=25&s=start_time&sd=desc"
    enabled: true

  - name: "Wyoming Public Media"
    url: "https://www.wyomingpublicmedia.org/rss.xml"
    # Alternate feeds by section:
    # https://www.wyomingpublicmedia.org/natural-resources-energy/rss.xml
    # https://www.wyomingpublicmedia.org/wyoming-economy/rss.xml
    enabled: true

  - name: "Oil City News"
    url: "https://oilcity.news/feed/"
    enabled: true

  - name: "SweetwaterNOW"
    url: "https://sweetwaternow.com/feed/"
    enabled: true

  - name: "Cowboy State Daily"
    url: ""
    # CSD does NOT publish a public RSS feed. Leave URL empty.
    # CSD articles should be added manually via manual_input.py
    enabled: false

# Keyword filters — articles must match at least one keyword group.
# Matching is case-insensitive.
keywords:
  primary:  # High-confidence: any single match = relevant
    - "data center"
    - "data centre"
    - "hyperscale"
    - "hyperscaler"
    - "Prometheus Hyperscale"
    - "server farm"
  companies:  # Match only when combined with Wyoming context
    - "Crusoe"
    - "Tallgrass"
    - "Microsoft"
    - "Meta"
    - "Project Jade"
  secondary:  # Broader terms — require co-occurrence with a location or primary term
    - "large load"
    - "megawatt"
    - "gigawatt"
    - "industrial siting"
    - "ratepayer"
    - "energy demand"
    - "grid capacity"
    - "cooling water"

# Location keywords for geographic tagging
locations:
  evanston: ["Evanston", "Uinta County", "southwest Wyoming"]
  casper: ["Casper", "Natrona County", "central Wyoming"]
  cheyenne: ["Cheyenne", "Laramie County", "southeast Wyoming"]
  statewide: []  # Default if no specific location matched

# Anthropic API
# NOTE: Set your API key as an environment variable:
#   export ANTHROPIC_API_KEY="sk-ant-..."
# Do NOT hardcode the key here.
anthropic:
  classification_model: "claude-haiku-4-5-20251001"
  synthesis_model: "claude-sonnet-4-5-20250929"
  max_retries: 3
  timeout_seconds: 30

# Digest settings
digest:
  interval_days: 14
  output_format: "markdown"
  max_articles_per_digest: 50

# Scheduling
schedule:
  feed_check_interval_hours: 12
  digest_generation_day: "Monday"
