# Prometheus Resistance Dashboard — Configuration
# Nationwide data center sentiment tracking

# ══════════════════════════════════════════════════
# Nationwide keyword & search configuration
# Applies to ALL articles regardless of state
# ══════════════════════════════════════════════════
nationwide:
  keywords:
    # ── Primary: any single match = article is relevant (score 1.0) ──
    primary:
      # Direct identifiers
      - "data center"
      - "data centre"
      - "datacenter"
      - "hyperscale"
      - "server farm"
      - "colocation"
      - "colo facility"
      - "Prometheus Hyperscale"
      # Scale / type descriptors
      - "AI data center"
      - "AI factory"
      - "AI superfactory"
      - "AI infrastructure"
      - "edge data center"
      - "modular data center"
      - "cloud data center"
      - "wholesale data center"
      - "hyperscale campus"
      - "compute campus"
      # Regulatory / opposition
      - "data center moratorium"
      - "data center ban"
      - "data center zoning"
      - "data center ordinance"
      - "data center permit"
      - "data center setback"
      # Construction / development
      - "data center campus"
      - "data center construction"
      - "data center development"
      - "data center site"
      - "data center proposal"
      - "data center project"
      - "data center approved"
      - "data center expansion"
      # Infrastructure impact
      - "data center power"
      - "data center energy"
      - "data center electricity"
      - "data center cooling"
      - "data center water"
      - "data center noise"
      - "data center grid"

    # ── Companies: require topic signal co-occurrence (score 0.9/0.8) ──
    companies:
      # Hyperscalers
      - "Microsoft"
      - "Meta"
      - "Amazon"
      - "AWS"
      - "Google"
      - "Apple"
      - "Oracle"
      - "ByteDance"
      # AI companies
      - "OpenAI"
      - "Anthropic"
      - "xAI"
      - "CoreWeave"
      - "Inflection AI"
      - "Cohere"
      # Data center developers / operators
      - "Equinix"
      - "Digital Realty"
      - "QTS"
      - "CyrusOne"
      - "Vantage Data Centers"
      - "Compass Datacenters"
      - "EdgeCore"
      - "Applied Digital"
      - "Core Scientific"
      - "Lancium"
      - "Switch"
      - "CloudHQ"
      - "DataBank"
      - "T5 Data Centers"
      - "Aligned Data Centers"
      - "Flexential"
      - "Iron Mountain Data Centers"
      - "Prime Data Centers"
      - "Stack Infrastructure"
      - "Stream Data Centers"
      - "Yondr"
      - "TerraScale"
      - "Skybox"
      - "Cologix"
      - "NTT Data Centers"
      - "Crusoe Energy"
      # Investment / financial
      - "DigitalBridge"
      - "Blackstone"
      - "KKR"
      - "SoftBank"
      - "Blue Owl Capital"
      - "Brookfield Infrastructure"
      - "MGX"
      # Energy / utility partners (use full names to avoid ambiguity)
      - "Constellation Energy"
      - "Vistra Energy"
      - "Talen Energy"
      - "Entergy"
      - "Duke Energy"
      - "Dominion Energy"
      - "TVA"
      - "NextEra Energy"
      - "Southern Company"
      - "AEP"
      - "Oklo"
      - "NuScale"
      - "TerraPower"
      - "Kairos Power"
      - "Tallgrass Energy"
      - "Bloom Energy"
      - "Energy Northwest"
      # Construction / engineering
      - "Turner Construction"
      - "DPR Construction"
      - "Holder Construction"
      - "HITT Contracting"
      - "Mortenson"
      - "Clayco"
      - "Fortis Construction"
      - "JE Dunn"
      - "Fluor Corporation"
      # Cooling / infrastructure tech
      - "Vertiv"
      - "Schneider Electric"
      - "Green Revolution Cooling"
      - "CoolIT Systems"
      - "nVent"

    # ── Secondary: require co-occurrence with primary/company/topic signal (score 0.6) ──
    secondary:
      # Grid / energy
      - "large load"
      - "megawatt"
      - "gigawatt"
      - "grid capacity"
      - "interconnection queue"
      - "power purchase agreement"
      - "behind the meter"
      - "industrial load"
      - "load growth"
      - "peak demand"
      - "grid reliability"
      - "transmission capacity"
      - "capacity market"
      - "capacity auction"
      - "integrated resource plan"
      # Grid operators / regulators
      - "PJM"
      - "ERCOT"
      - "MISO"
      - "CAISO"
      - "FERC"
      - "SPP"
      # Water / cooling
      - "cooling water"
      - "water consumption"
      - "evaporative cooling"
      - "water rights"
      - "water withdrawal"
      - "water usage effectiveness"
      # Land use / zoning
      - "industrial siting"
      - "industrial zoning"
      - "special use permit"
      - "conditional use permit"
      - "rezoning"
      - "special exception"
      - "setback requirement"
      # Economic / tax
      - "ratepayer"
      - "tax abatement"
      - "tax incentive"
      - "tax exemption"
      - "enterprise zone"
      - "PILOT agreement"
      - "rate increase"
      - "rate class"
      # Community impact
      - "noise ordinance"
      - "noise pollution"
      - "community impact"
      - "environmental justice"
      - "environmental racism"
      # Opposition organizations
      - "Food and Water Watch"
      - "Data Center Watch"
      - "Good Jobs First"
      - "Sierra Club"
      - "FracTracker Alliance"
      # Nuclear / advanced energy
      - "small modular reactor"
      - "SMR"
      - "nuclear restart"
      - "advanced reactor"

  # ── Sweep query templates (used by per-state sweep mode) ──
  # Each template is run once per US state, with the state name appended.
  # Keep this list short and high-signal — 6 templates × 50 states = 300 queries.
  sweep_queries:
    - '"data center"'
    - '"data center" construction OR development OR proposed'
    - '"data center" opposition OR moratorium OR ban'
    - 'hyperscale OR "AI infrastructure" OR "server farm"'
    - '"data center" energy OR power OR grid'
    - '"data center" tax OR incentive OR zoning'

  # ── Nationwide thematic pass (each run ONCE, with NO state suffix) ──
  # High-signal company / national queries that catch stories which don't name a
  # state in the headline (e.g. a national Stargate or xAI announcement). State
  # is attributed afterward via text inference (geo.infer_state_from_text).
  # These run once per sweep — NOT once per state — so the list can stay broad
  # without multiplying the query budget.
  thematic_queries:
    - '"data center" opposition OR moratorium OR ban OR protest'
    - '"data center" "interconnection queue" OR FERC OR PJM OR "grid capacity"'
    - '"data center" ratepayer OR "rate increase" OR "electricity bill"'
    - '"data center" nuclear OR SMR OR "small modular reactor"'
    - '"data center" "environmental justice" OR "Clean Air Act" OR emissions'
    - '"data center" legislation OR bill OR moratorium 2026'
    - '"Stargate" data center OR OpenAI OR SoftBank'
    - 'xAI data center OR Colossus OR supercomputer'
    - 'Anthropic data center OR infrastructure'
    - 'Meta OR Microsoft OR Amazon OR Google "data center" campus'
    - '"AI data center" OR "AI infrastructure" OR "AI factory"'
    - 'Prometheus Hyperscale'


# ══════════════════════════════════════════════════
# Priority states — deep monitoring with state-specific
# keyword and location tracking (used by relevance scoring
# and state attribution; searches use the unified sweep)
# ══════════════════════════════════════════════════
priority_states:
  wyoming:
    keywords:
      primary: []
      companies: ["Crusoe", "Tallgrass", "Project Jade"]
      secondary: ["energy demand"]
    locations:
      evanston: ["Evanston", "Uinta County", "southwest Wyoming"]
      casper: ["Casper", "Natrona County", "central Wyoming"]
      cheyenne: ["Cheyenne", "Laramie County", "southeast Wyoming"]

  texas:
    keywords:
      primary: []
      companies: ["Skybox", "Stream Data Centers"]
      secondary: ["ERCOT", "power purchase"]
    locations:
      dallas: ["Dallas", "Dallas-Fort Worth", "DFW", "Ellis County",
               "Lancaster", "Red Oak", "Venus"]

  michigan:
    keywords:
      primary: []
      companies: ["Panattoni", "Related Digital", "Green Chile Ventures"]
      secondary: ["DTE Energy", "MPSC", "Project Cannoli", "Consumers Energy"]
    locations:
      ann_arbor: ["Ann Arbor", "Saline Township", "Washtenaw County"]
      van_buren: ["Van Buren Township", "Wayne County"]
      benton_harbor: ["Benton Harbor", "Benton Township", "Berrien County", "St. Joseph"]

# ──────────────────────────────────────────────
# Topic categories for article classification
# ──────────────────────────────────────────────
topics:
  - key: energy_ratepayer
    label: "Energy & Ratepayer Impact"
    description: "Electricity costs, rate increases, ratepayer burden from data center loads"
  - key: grid_infrastructure
    label: "Grid & Infrastructure"
    description: "Power grid capacity, transmission lines, utility planning, interconnection"
  - key: water
    label: "Water Usage"
    description: "Cooling water consumption, aquifer impact, drought concerns, water rights"
  - key: jobs_economic
    label: "Jobs & Economic Development"
    description: "Employment, tax revenue, economic growth, workforce development"
  - key: land_use_wildlife
    label: "Land Use & Wildlife"
    description: "Zoning, farmland conversion, habitat disruption, site selection"
  - key: regulation_transparency
    label: "Regulation & Transparency"
    description: "Permitting, moratoriums, public disclosure, legislative action, bans"
  - key: tax_incentives
    label: "Tax Incentives"
    description: "Tax abatements, incentive packages, public subsidies, TIF districts"
  - key: national_security_ai
    label: "National Security & AI"
    description: "AI infrastructure as national priority, defense applications, security"
  - key: community_impact
    label: "Community Impact"
    description: "Noise, traffic, quality of life, local opposition or support, public meetings"
  - key: environmental
    label: "Environmental"
    description: "Carbon emissions, renewable energy commitments, climate impact, pollution"
  - key: property_housing
    label: "Property & Housing"
    description: "Property values, housing market impact, real estate, construction disruption"

# ──────────────────────────────────────────────
# Local LLM (Ollama) — for relevance scoring, classification, summarization
# ──────────────────────────────────────────────
local_llm:
  enabled: true
  model: "qwen3:8b"
  base_url: "http://localhost:11434"
  fallback_to_api: true  # use Claude API if Ollama unavailable

# ──────────────────────────────────────────────
# Pipeline settings
# ──────────────────────────────────────────────
pipeline:
  auto_approve_threshold: 7     # Auto-approve articles scoring 7+
  auto_reject_threshold: 3      # Auto-reject articles scoring 3 or below
  relevance_model: "claude-haiku-4-5-20251001"
  default_days_back: 30

# ──────────────────────────────────────────────
# Anthropic API
# ──────────────────────────────────────────────
# Set your API key: export ANTHROPIC_API_KEY="sk-ant-..."
anthropic:
  classification_model: "claude-haiku-4-5-20251001"
  synthesis_model: "claude-sonnet-4-5-20250929"
  max_retries: 3
  timeout_seconds: 30

# ──────────────────────────────────────────────
# Article infill (gradual Google News resolution + thin-content scrape)
# Used by the `infill` command, intended to run daily on a persistent host.
# ──────────────────────────────────────────────
infill:
  resolve_limit_per_run: 50          # Google News URLs to resolve per daily run
  interval_seconds: 2.0              # pause between resolutions (rate-limit safety)
  rate_limit_backoff_seconds: 60     # initial backoff when Google returns 429
  max_rate_limit_hits: 3             # stop early after this many sustained 429s
  scrape_workers: 4                  # threads for the thin-content scrape pass

# ──────────────────────────────────────────────
# Digest settings
# ──────────────────────────────────────────────
digest:
  interval_days: 14
  output_format: "markdown"
  max_articles_per_digest: 50

# ──────────────────────────────────────────────
# Scheduling
# ──────────────────────────────────────────────
schedule:
  feed_check_interval_hours: 12
  digest_generation_day: "Monday"
